<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Flo — Expense Tracker{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #14161d;
      --surface2: #1c1f2a;
      --border: #252836;
      --accent: #7c6af7;
      --accent2: #f7c46a;
      --income: #4ade80;
      --expense: #f87171;
      --text: #e8eaf0;
      --muted: #6b7280;
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 0;
      position: fixed;
      top: 0; left: 0;
    }
    .sidebar-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--accent);
      padding: 0 24px 32px;
      letter-spacing: -0.5px;
    }
    .sidebar-logo span { color: var(--accent2); }
    .nav-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      padding: 0 24px 8px;
      font-weight: 500;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 24px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 500;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--text);
      background: var(--surface2);
      border-left-color: var(--accent);
    }
    .nav-link svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-bottom {
      margin-top: auto;
      padding: 0 16px;
    }
    .user-card {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      color: white;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .logout-btn {
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
    }
    .logout-btn:hover { color: var(--expense); }

    /* MAIN */
    .main {
      margin-left: 240px;
      flex: 1;
      padding: 36px 40px;
      min-height: 100vh;
    }

    /* PAGE HEADER */
    .page-header {
      margin-bottom: 32px;
    }
    .page-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .page-subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

    /* STAT CARDS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .stat-card.income::before { background: var(--income); }
    .stat-card.expense::before { background: var(--expense); }
    .stat-card.balance::before { background: var(--accent); }
    .stat-label {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .stat-card.income .stat-value { color: var(--income); }
    .stat-card.expense .stat-value { color: var(--expense); }
    .stat-card.balance .stat-value { color: var(--accent); }

    /* CHARTS */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      gap: 20px;
      margin-bottom: 32px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 20px;
      color: var(--text);
    }
    .chart-container { position: relative; }

    /* TABLE */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      padding: 0 16px 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 16px;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* BADGES */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-income { background: rgba(74,222,128,0.15); color: var(--income); }
    .badge-expense { background: rgba(248,113,113,0.15); color: var(--expense); }

    .amount-income { color: var(--income); font-weight: 600; }
    .amount-expense { color: var(--expense); font-weight: 600; }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #6b5ce7; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
    .btn-danger { background: rgba(248,113,113,0.15); color: var(--expense); border: 1px solid rgba(248,113,113,0.3); }
    .btn-danger:hover { background: var(--expense); color: white; }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

    /* FORMS */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .form-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 0.92rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .form-input option { background: var(--surface2); }
    .errorlist { color: var(--expense); font-size: 0.8rem; list-style: none; margin-top: 4px; }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      align-items: center;
    }
    .filter-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }
    .filter-select:focus { outline: none; border-color: var(--accent); }

    /* ALERTS */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-bottom: 20px;
      border-left: 3px solid;
    }
    .alert-success { background: rgba(74,222,128,0.1); border-color: var(--income); color: var(--income); }
    .alert-error { background: rgba(248,113,113,0.1); border-color: var(--expense); color: var(--expense); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state p { font-size: 1rem; margin-bottom: 4px; color: var(--text); }
    .empty-state span { font-size: 0.85rem; }

    /* MONTH FILTER */
    .month-filter { display: flex; gap: 10px; align-items: center; margin-bottom: 28px; flex-wrap: wrap; }

    /* CATEGORY DOT */
    .cat-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      background: var(--accent);
    }

    @media (max-width: 900px) {
      .sidebar { width: 64px; padding: 20px 0; }
      .sidebar-logo, .nav-label, .user-info, .logout-btn { display: none; }
      .nav-link { padding: 14px; justify-content: center; }
      .nav-link svg { width: 22px; height: 22px; }
      .main { margin-left: 64px; padding: 24px 20px; }
      .stats-grid { grid-template-columns: 1fr; }
      .charts-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

{% if user.is_authenticated %}
<aside class="sidebar">
  <div class="sidebar-logo">Flo<span>.</span></div>
  <div class="nav-label">Menu</div>
  <a href="{% url 'dashboard' %}" class="nav-link {% block nav_dashboard %}{% endblock %}">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Dashboard
  </a>
  <a href="{% url 'transaction_list' %}" class="nav-link {% block nav_transactions %}{% endblock %}">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    Transactions
  </a>
  <a href="{% url 'add_transaction' %}" class="nav-link {% block nav_add %}{% endblock %}">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    Add New
  </a>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="avatar">{{ user.username|slice:":1"|upper }}</div>
      <div class="user-info">
        <div class="user-name">{{ user.username }}</div>
        <a href="{% url 'logout' %}" class="logout-btn">Sign out →</a>
      </div>
    </div>
  </div>
</aside>
{% endif %}

<main class="main">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</main>

</body>
</html>
